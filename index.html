<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 LIMBO</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E🚀%3C/text%3E%3C/svg%3E">

<style>
body{margin:0;font-family:Arial;background:black;color:white;text-align:center;overflow:hidden}
.container{max-width:400px;margin:auto;padding:20px}
.card{background:#111;padding:15px;border-radius:12px;margin-bottom:10px;border:1px solid #333}
input{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:none}
button{width:100%;padding:12px;border:none;border-radius:10px;margin-top:8px;background:purple;color:white;font-size:16px;cursor:pointer}
.rocket-box{height:220px;border:1px solid purple;border-radius:12px;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:center}
#rocket{font-size:40px;transition:transform 1s}
.flame{position:absolute;bottom:40px;font-size:20px;animation:flame 0.2s infinite}
@keyframes flame{0%{transform:scaleY(1)}50%{transform:scaleY(1.6)}100%{transform:scaleY(1)}}
.star{position:absolute;width:2px;height:2px;background:white;animation:float 3s infinite}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(20px)}100%{transform:translateY(0)}}
</style>
</head>

<body>

<div id="stars"></div>

<div class="container">
<h2 id="title">🚀 LIMBO</h2>
<div>👥 <span id="players">120</span> online</div>

<div class="card">💰 Balance: ₹<span id="balance">1000</span></div>

<div class="card">
<input type="number" id="bet" value="50">
<input type="number" id="target" value="2">
<button onclick="play()">PLAY</button>
<button onclick="toggleAuto()">AUTO</button>
</div>

<div id="adminBox" class="card" style="display:none">
Admin win %
<input type="number" id="winRate" value="15">
</div>

<div class="rocket-box">
<div id="flame" class="flame" style="display:none">🔥</div>
<div id="rocket">🚀</div>
</div>

<div class="card">Result: <span id="result">-</span></div>
</div>

<script>
let balance=1000;
let auto=false;
let tap=0;
let gameCount=0;
let lossCount=0;
let interval;

let crashSound;
document.addEventListener("click",()=>{
if(!crashSound){crashSound=new Audio("crash.mp3");}
},{once:true});

function play(){
let bet=Number(document.getElementById("bet").value);
let target=Number(document.getElementById("target").value);
let winRate=Number(document.getElementById("winRate").value);

if(bet>balance)return;

balance-=bet;
document.getElementById("balance").innerText=balance;

document.getElementById("flame").style.display="block";

let countdown=8;
let resultBox=document.getElementById("result");
resultBox.innerText="Starting in 8...";

let timer=setInterval(()=>{
countdown--;
resultBox.innerText="Starting in "+countdown+"...";

if(countdown<=0){
clearInterval(timer);

gameCount++;

let shouldWin=false;

// first game always win
if(gameCount===1){shouldWin=true;lossCount=0;}

// pattern W L L L W repeat
else{
let pos=(gameCount-1)%5;
if(pos===0||pos===4)shouldWin=true;
}

let crash;

if(shouldWin){
crash=(target+Math.random()*5+0.01).toFixed(2);
lossCount=0;

let winAmount=bet*target;
balance+=winAmount;
}
else{
crash=(Math.random()*(target-0.05)+0.05).toFixed(2);
lossCount++;

if(crashSound){crashSound.currentTime=0;crashSound.play();}
}

rocket(crash,target);

document.getElementById("balance").innerText=balance;
resultBox.innerText="Result: "+crash+"x";

document.getElementById("flame").style.display="none";
}
},1000);
}

function rocket(crash,target){
let r=document.getElementById("rocket");

if(crash>=target){r.style.transform="translateY(-180px)";}
else{r.style.transform="translateY(-40px)";}
}

function toggleAuto(){
auto=!auto;
if(auto){interval=setInterval(play,9000);} // 8 sec + gap
else{clearInterval(interval);}
}

// fake players
setInterval(()=>{
let p=document.getElementById("players");
p.innerText=Number(p.innerText)+Math.floor(Math.random()*5-2);
},3000);

// admin unlock
document.getElementById("title").onclick=()=>{
tap++;
if(tap>=5){
let pin=prompt("Enter admin PIN");
if(pin=="2580"){
document.getElementById("adminBox").style.display="block";
}
tap=0;
}
}

// stars
for(let i=0;i<40;i++){
let s=document.createElement("div");
s.className="star";
s.style.top=Math.random()*100+"%";
s.style.left=Math.random()*100+"%";
document.getElementById("stars").appendChild(s);
}
</script>

</body>
</html>
